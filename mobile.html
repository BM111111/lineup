<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>无畏契约 · 全技能点位工坊 (移动版)</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0a0f15;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            color: #eef4ff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #0c293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #5cd1cb; border-radius: 4px; }

        /* 右上角作者栏 */
        .author-corner {
            position: fixed;
            top: 0.5rem;
            right: 0.5rem;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(10,18,30,0.75);
            backdrop-filter: blur(8px);
            padding: 0.2rem 0.6rem 0.2rem 0.4rem;
            border-radius: 40px;
            border: 1px solid rgba(255,215,150,0.3);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .author-corner a { display: flex; align-items: center; gap: 8px; text-decoration: none; color: inherit; }
        .author-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1px solid #ffbc6e; }
        .author-name { font-size: 0.7rem; font-weight: 500; color: #ffdd99; }
        .author-name span { transition: color 0.2s; }
        .author-corner a:hover .author-name span { color: rgb(64,194,246); }

        /* 顶部操作栏 */
        .top-bar {
            background-color: #0a0f15;
            padding: 10px 12px;
            border-bottom: 1px solid #5cd1cb;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }
        .row-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .row-buttons button {
            background: #0c293b;
            border: 1px solid #5cd1cb;
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 1rem;
            font-weight: bold;
            color: #eef4ff;
            cursor: pointer;
        }
        .row-buttons button:active { background: #0d4e54; }
        .skill-row {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        .skill-btn {
            background: #1f2a44;
            border: none;
            border-radius: 12px;
            padding: 6px;
            cursor: pointer;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #5cd1cb;
        }
        .skill-btn img { width: 36px; height: 36px; object-fit: contain; filter: brightness(0) invert(1); }
        .skill-btn.active { background: #5BC4B9; border-color: #5BC4B9; }
        .skill-btn.active img { filter: brightness(1) invert(0); }

        /* 地图容器：占满剩余空间 */
        .map-wrapper {
            flex: 1;
            position: relative;
            background: #071018;
            overflow: hidden;
        }
        .svg-container {
            width: 100%;
            height: 100%;
            overflow: auto;
            text-align: center;
        }
        svg {
            width: 100%;
            height: auto;
            display: block;
            cursor: grab;
        }
        svg:active { cursor: grabbing; }

        /* 坐标拾取悬浮按钮 */
        .coord-picker-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0c293b;
            border: 1px solid #5cd1cb;
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #eef4ff;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .coord-picker-btn.active {
            background: #ffbc6e;
            color: #0a1a2a;
        }

        /* 模态框样式（复用电脑版） */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
            visibility: hidden; opacity: 0; transition: 0.2s;
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-container {
            background: #0a0f15; border: 1px solid #5cd1cb; border-radius: 2rem;
            width: 90%; max-width: 900px; max-height: 85vh; overflow-y: auto; padding: 1.2rem;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #5cd1cb; padding-bottom: 0.5rem; margin-bottom: 1rem; }
        .modal-header h3 { color: #5cd1cb; }
        .close-modal { background: none; border: none; font-size: 1.6rem; cursor: pointer; color: #ffbc6e; }
        .map-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 1rem; }
        .map-card-item {
            background: #0c293b; border-radius: 1.2rem; aspect-ratio: 16/9;
            background-size: cover; background-position: center; cursor: pointer;
            display: flex; align-items: center; justify-content: center; border: 2px solid transparent;
        }
        .map-card-item.active { border-color: #5cd1cb; }
        .map-name-overlay { font-size: 1.2rem; font-weight: bold; background: rgba(0,0,0,0.6); padding: 0.2rem 0.6rem; border-radius: 2rem; color: white; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px,1fr)); gap: 0.8rem; }
        .hero-card-item {
            background: #0c293b; border-radius: 1rem; text-align: center; padding: 0.5rem;
            cursor: pointer; border: 2px solid transparent;
        }
        .hero-card-item.active { border-color: #5cd1cb; background: #0d4e54; }
        .hero-card-item img { width: 64px; height: 64px; object-fit: contain; }
        .hero-name-overlay { font-size: 0.7rem; margin-top: 4px; color: #eef4ff; }

        /* 视频模态框 */
        #videoModal .modal-container { background: #000; border: none; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #videoModal .modal-header { background: #000; border-bottom: none; }
    </style>
</head>
<body>
<div class="author-corner">
    <a href="https://bm111111.github.io/bmdom/aboutme.html" target="_blank">
        <img class="author-avatar" src="https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/avatar.png" alt="avatar" onerror="this.src='images/avatar.png'">
        <div class="author-name">📌 <span>@BeiMing257</span></div>
    </a>
</div>

<!-- 顶部栏 -->
<div class="top-bar">
    <div class="row-buttons">
        <button id="mobileMapBtn">🗺️ 地图</button>
        <button id="mobileHeroBtn">🦸 英雄</button>
    </div>
    <div class="skill-row" id="skillFilterContainer">
        <button class="skill-btn" data-skill="c"><img src="" alt="C" id="skillIconC"></button>
        <button class="skill-btn" data-skill="q"><img src="" alt="Q" id="skillIconQ"></button>
        <button class="skill-btn" data-skill="e"><img src="" alt="E" id="skillIconE"></button>
        <button class="skill-btn" data-skill="x"><img src="" alt="X" id="skillIconX"></button>
    </div>
</div>

<!-- 地图容器 -->
<div class="map-wrapper">
    <div class="svg-container" id="svgContainer">
        <svg id="mapSvg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet">
            <image id="mapImage" href="" width="1920" height="1080" />
        </svg>
    </div>
</div>

<!-- 坐标拾取按钮 -->
<button id="coordPickerBtn" class="coord-picker-btn">📐 拾取坐标</button>

<!-- 模态框 -->
<div id="mapModal" class="modal-overlay"><div class="modal-container"><div class="modal-header"><h3>🗺️ 选择地图</h3><button class="close-modal" id="closeMapModal">✖</button></div><div id="mapModalContent" class="map-grid"></div></div></div>
<div id="heroModal" class="modal-overlay"><div class="modal-container"><div class="modal-header"><h3>🦸 选择英雄</h3><button class="close-modal" id="closeHeroModal">✖</button></div><div id="heroModalContent" class="hero-grid"></div></div></div>
<div id="videoModal" class="modal-overlay" style="z-index: 3000;">
    <div class="modal-container" style="width: 95vw; height: 90vh; background: #000; padding: 0;">
        <div class="modal-header" style="border-bottom: none; padding: 8px 12px;">
            <h3 style="color: #fff;">视频点位</h3>
            <button class="close-modal" id="closeVideoModal" style="color: #fff;">✖</button>
        </div>
        <div style="width: 100%; height: calc(100% - 50px);">
            <iframe id="videoIframe" src="" frameborder="0" allowfullscreen style="width: 100%; height: 100%;"></iframe>
        </div>
    </div>
</div>

<script src="skills.js"></script>
<script>
    // ========== 英雄数据 ==========
    const heroesList = [
        { id: "jett", name: "捷风", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/jett.png" },
        { id: "phoenix", name: "不死鸟", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/phoenix.png" },
        { id: "raze", name: "雷兹", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/raze.png" },
        { id: "reyna", name: "芮娜", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/reyna.png" },
        { id: "yoru", name: "夜露", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/yoru.png" },
        { id: "neon", name: "霓虹", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/neon.png" },
        { id: "iso", name: "壹决", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/iso.png" },
        { id: "waylay", name: "幻棱", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/waylay.png" },
        { id: "clove", name: "暮蝶", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/clove.png" },
        { id: "viper", name: "蝰蛇", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/viper.png" },
        { id: "harbor", name: "海神", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/harbor2.png" },
        { id: "miks", name: "迷核", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/miks2.png" },
        { id: "astra", name: "星礈", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/astra.png" },
        { id: "brimstone", name: "炼狱", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/brimstone.png" },
        { id: "omen", name: "幽影", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/omen.png" },
        { id: "gekko", name: "盖可", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/gekko2.png" },
        { id: "fade", name: "黑梦", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/fade2.png" },
        { id: "breach", name: "铁臂", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/breach.png" },
        { id: "kayo", name: "K/O", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/kayo.png" },
        { id: "skye", name: "斯凯", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/skye.png" },
        { id: "tejo", name: "钛狐", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/tejo.png" },
        { id: "sova", name: "猎枭", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/sova.png" },
        { id: "sage", name: "贤者", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/sage.png" },
        { id: "chamber", name: "尚博勒", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/chamber2.png" },
        { id: "deadlock", name: "钢索", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/deadlock2.png" },
        { id: "killjoy", name: "奇乐", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/killjoy.png" },
        { id: "vyse", name: "维斯", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/vyse.png" },
        { id: "cypher", name: "零", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/cypher.png" },
        { id: "veto", name: "禁灭", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/veto.png" }
    ];

    const mapsList = [
        { id: "ascent", name: "亚海悬城", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/ascent.png" },
        { id: "bind", name: "源工重镇", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/bind.png" },
        { id: "split", name: "霓虹町", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/split.png" },
        { id: "haven", name: "隐世修所", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/haven.png" },
        { id: "breeze", name: "微风岛屿", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/breeze.png" },
        { id: "icebox", name: "森寒冬港", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/icebox.png" },
        { id: "fracture", name: "裂变峡谷", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/fracture.png" },
        { id: "lotus", name: "莲华古城", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/lotus.png" },
        { id: "pearl", name: "深海明珠", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/pearl.png" },
        { id: "sunset", name: "日落之城", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/sunset.png" },
        { id: "abyss", name: "幽邃地窟", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/abyss.png" },
        { id: "corrode", name: "盐海矿镇", img: "https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/corrode.png" }
    ];

    // 注意：skillsData 由外部 skills.js 提供
    let currentMap = mapsList[0];
    let currentHero = heroesList[0];
    let currentSkillFilter = null;
    let currentSkills = [];
    let lockedSkill = null;
    let currentPreviewSkill = null;
    let previewElements = { stanceGroups: [], lines: [] };
    let currentScale = 1, currentTranslateX = 0, currentTranslateY = 0, isPanning = false, startX, startY;

    // DOM 元素
    const svg = document.getElementById('mapSvg');
    const mapImage = document.getElementById('mapImage');
    const svgContainer = document.getElementById('svgContainer');
    const selectionInfoPanel = null; // 手机版无此面板，但保留变量避免报错
    const skillIconC = document.getElementById('skillIconC');
    const skillIconQ = document.getElementById('skillIconQ');
    const skillIconE = document.getElementById('skillIconE');
    const skillIconX = document.getElementById('skillIconX');

    const mapModal = document.getElementById('mapModal');
    const heroModal = document.getElementById('heroModal');
    const mapModalContent = document.getElementById('mapModalContent');
    const heroModalContent = document.getElementById('heroModalContent');
    const closeMapModal = document.getElementById('closeMapModal');
    const closeHeroModal = document.getElementById('closeHeroModal');
    const mobileMapBtn = document.getElementById('mobileMapBtn');
    const mobileHeroBtn = document.getElementById('mobileHeroBtn');

    // 视频相关
    const videoModal = document.getElementById('videoModal');
    const videoIframe = document.getElementById('videoIframe');
    const closeVideoModalBtn = document.getElementById('closeVideoModal');

    // 坐标拾取
    const coordPickerBtn = document.getElementById('coordPickerBtn');
    let coordPickerActive = false;

    // 辅助函数：显示提示（手机版简单 alert，或可改为 toast）
    function showMsg(msg) { alert(msg); }

    // 打开地图模态框
    function openMapModal() {
        mapModalContent.innerHTML = '';
        mapsList.forEach(map => {
            const card = document.createElement('div');
            card.className = 'map-card-item';
            if (currentMap.id === map.id) card.classList.add('active');
            const bgImgUrl = `https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/bg_${map.id}.png`;
            card.style.backgroundImage = `url('${bgImgUrl}')`;
            card.innerHTML = `<div class="map-name-overlay">${map.name}</div>`;
            card.addEventListener('click', () => {
                currentMap = map;
                updateUI();
                mapModal.classList.remove('active');
            });
            mapModalContent.appendChild(card);
        });
        mapModal.classList.add('active');
    }

    // 打开英雄模态框
    function openHeroModal() {
        heroModalContent.innerHTML = '';
        heroesList.forEach(hero => {
            const card = document.createElement('div');
            card.className = 'hero-card-item';
            if (currentHero.id === hero.id) card.classList.add('active');
            card.innerHTML = `<img src="${hero.img}" onerror="this.src='images/${hero.img.split('/').pop()}'"><div class="hero-name-overlay">${hero.name}</div>`;
            card.addEventListener('click', () => {
                currentHero = hero;
                updateUI();
                heroModal.classList.remove('active');
            });
            heroModalContent.appendChild(card);
        });
        heroModal.classList.add('active');
    }

    function closeModal(modal) { modal.classList.remove('active'); }
    if (closeMapModal) closeMapModal.addEventListener('click', () => closeModal(mapModal));
    if (closeHeroModal) closeHeroModal.addEventListener('click', () => closeModal(heroModal));
    if (mapModal) mapModal.addEventListener('click', (e) => { if (e.target === mapModal) closeModal(mapModal); });
    if (heroModal) heroModal.addEventListener('click', (e) => { if (e.target === heroModal) closeModal(heroModal); });
    if (mobileMapBtn) mobileMapBtn.addEventListener('click', openMapModal);
    if (mobileHeroBtn) mobileHeroBtn.addEventListener('click', openHeroModal);

    // 视频模态框
    function convertToEmbedUrl(url) {
        if (url.includes('blackboard/html5mobileplayer.html')) return url;
        const bvMatch = url.match(/BV([a-zA-Z0-9]+)/);
        if (!bvMatch) return url;
        const bvid = 'BV' + bvMatch[1];
        const tMatch = url.match(/[?&]t=(\d+)/);
        const t = tMatch ? `&t=${tMatch[1]}` : '';
        return `https://www.bilibili.com/blackboard/html5mobileplayer.html?bvid=${bvid}&autoplay=0&danmaku=1${t}&muted=1`;
    }
    function openVideoModal(videoUrl) {
        if (!videoUrl) return;
        videoIframe.src = convertToEmbedUrl(videoUrl);
        videoModal.classList.add('active');
    }
    function closeVideoModalFunc() {
        videoIframe.src = '';
        videoModal.classList.remove('active');
    }
    if (closeVideoModalBtn) closeVideoModalBtn.addEventListener('click', closeVideoModalFunc);
    if (videoModal) videoModal.addEventListener('click', (e) => { if (e.target === videoModal) closeVideoModalFunc(); });

    // 技能图标更新
    function updateSkillIcons() {
        const baseUrl = `https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/skills/${currentHero.id}_`;
        if (skillIconC) skillIconC.src = baseUrl + 'c.png';
        if (skillIconQ) skillIconQ.src = baseUrl + 'q.png';
        if (skillIconE) skillIconE.src = baseUrl + 'e.png';
        if (skillIconX) skillIconX.src = baseUrl + 'x.png';
        [skillIconC, skillIconQ, skillIconE, skillIconX].forEach(img => {
            if (img) img.onerror = () => { img.src = `images/skills/${currentHero.id}_${img.alt.toLowerCase()}.png`; };
        });
    }

    // 过滤技能
    function filterSkills() {
        let filtered = skillsData.filter(s => s.mapId === currentMap.id && s.heroId === currentHero.id);
        if (currentSkillFilter) {
            filtered = filtered.filter(s => s.skillKey === currentSkillFilter);
        }
        currentSkills = filtered;
        renderSkillIcons();
        clearLocked();
        clearPreview();
    }

    // 渲染技能图标
    function renderSkillIcons() {
        const existingGroups = svg.querySelectorAll('.skill-group');
        existingGroups.forEach(g => g.remove());
        currentSkills.forEach(skill => {
            const types = skill.positions.map(p => p.type);
            const allAttack = types.every(t => t === 'attack');
            const allDefend = types.every(t => t === 'defend');
            let bgColor;
            if (allAttack) bgColor = 'rgb(217, 68, 50)';
            else if (allDefend) bgColor = 'rgb(0, 220, 210)';
            else bgColor = '#ffbc6e';
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('transform', `translate(${skill.skillX}, ${skill.skillY})`);
            g.setAttribute('class', 'skill-group');
            g.style.cursor = 'pointer';
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('r', '22');
            circle.setAttribute('fill', bgColor);
            circle.setAttribute('stroke', '#fff');
            circle.setAttribute('stroke-width', '1.5');
            const icon = document.createElementNS('http://www.w3.org/2000/svg', 'image');
            const skillUrl = `https://cdn.jsdelivr.net/gh/bm111111/lineup@main/images/skills/${skill.heroId}_${skill.skillKey}.png`;
            icon.setAttribute('href', skillUrl);
            icon.setAttribute('width', '28');
            icon.setAttribute('height', '28');
            icon.setAttribute('x', '-14');
            icon.setAttribute('y', '-14');
            icon.setAttribute('style', 'filter: brightness(0);');
            icon.onerror = () => { icon.setAttribute('href', `images/skills/${skill.heroId}_${skill.skillKey}.png`); };
            g.appendChild(circle);
            g.appendChild(icon);
            // 点击锁定（手机无悬浮）
            g.addEventListener('click', (e) => {
                e.stopPropagation();
                if (lockedSkill === skill) {
                    clearLocked();
                } else {
                    clearLocked();
                    lockedSkill = skill;
                    showLocked(skill);
                }
            });
            svg.appendChild(g);
        });
    }

    function showLocked(skill) {
        clearLockedElements();
        skill.positions.forEach(pos => {
            const heroGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            heroGroup.setAttribute('transform', `translate(${pos.heroX}, ${pos.heroY})`);
            heroGroup.setAttribute('class', 'locked-stance');
            heroGroup.style.cursor = 'pointer';
            const heroCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            heroCircle.setAttribute('r', '22');
            heroCircle.setAttribute('fill', '#1f2a44');
            heroCircle.setAttribute('stroke', '#ffbc6e');
            heroCircle.setAttribute('stroke-width', '2');
            const heroImg = document.createElementNS('http://www.w3.org/2000/svg', 'image');
            heroImg.setAttribute('href', currentHero.img);
            heroImg.setAttribute('width', '28');
            heroImg.setAttribute('height', '28');
            heroImg.setAttribute('x', '-14');
            heroImg.setAttribute('y', '-14');
            heroImg.onerror = () => { heroImg.setAttribute('href', `images/${currentHero.img.split('/').pop()}`); };
            heroGroup.appendChild(heroCircle);
            heroGroup.appendChild(heroImg);
            heroGroup.addEventListener('click', (e) => {
                e.stopPropagation();
                if (pos.videoUrl) openVideoModal(pos.videoUrl);
                else showMsg('⛔ 该点位暂无视频链接');
            });
            svg.appendChild(heroGroup);
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', skill.skillX);
            line.setAttribute('y1', skill.skillY);
            line.setAttribute('x2', pos.heroX);
            line.setAttribute('y2', pos.heroY);
            line.setAttribute('stroke', '#ffbc6e');
            line.setAttribute('stroke-width', '3');
            line.setAttribute('stroke-dasharray', '6,4');
            line.setAttribute('class', 'locked-line');
            svg.appendChild(line);
            if (!window._lockedElements) window._lockedElements = [];
            window._lockedElements.push(heroGroup, line);
        });
    }

    function clearLockedElements() {
        if (window._lockedElements) {
            window._lockedElements.forEach(el => el.remove());
            window._lockedElements = [];
        }
    }

    function clearLocked() {
        clearLockedElements();
        lockedSkill = null;
    }

    function clearPreview() {
        // 手机版无预览，空实现
    }

    function bindClearOnBlank() {
        svg.addEventListener('click', (e) => {
            if (e.target === svg || e.target === mapImage) {
                clearLocked();
            }
        });
    }

    // 缩放拖拽
    function initSVGPanZoom() {
        const container = svgContainer;
        svg.style.transformOrigin = '0 0';
        svg.style.transform = `translate(${currentTranslateX}px, ${currentTranslateY}px) scale(${currentScale})`;
        container.addEventListener('wheel', e => {
            e.preventDefault();
            const rect = svg.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            let newScale = currentScale * delta;
            newScale = Math.min(3, Math.max(0.5, newScale));
            if (newScale === currentScale) return;
            const scaleChange = newScale / currentScale;
            currentTranslateX = mouseX - (mouseX - currentTranslateX) * scaleChange;
            currentTranslateY = mouseY - (mouseY - currentTranslateY) * scaleChange;
            currentScale = newScale;
            svg.style.transform = `translate(${currentTranslateX}px, ${currentTranslateY}px) scale(${currentScale})`;
        }, { passive: false });
        // 触摸拖拽
        let touchStart = { x: 0, y: 0 };
        let touchPrev = { x: 0, y: 0 };
        let isTouching = false;
        svg.addEventListener('touchstart', e => {
            if (e.touches.length === 1) {
                isTouching = true;
                touchStart.x = e.touches[0].clientX;
                touchStart.y = e.touches[0].clientY;
                touchPrev.x = currentTranslateX;
                touchPrev.y = currentTranslateY;
                e.preventDefault();
            }
        });
        window.addEventListener('touchmove', e => {
            if (!isTouching) return;
            const dx = e.touches[0].clientX - touchStart.x;
            const dy = e.touches[0].clientY - touchStart.y;
            currentTranslateX = touchPrev.x + dx;
            currentTranslateY = touchPrev.y + dy;
            svg.style.transform = `translate(${currentTranslateX}px, ${currentTranslateY}px) scale(${currentScale})`;
            e.preventDefault();
        });
        window.addEventListener('touchend', () => { isTouching = false; });
        // 鼠标拖拽（调试用）
        svg.addEventListener('mousedown', e => {
            isPanning = true;
            startX = e.clientX - currentTranslateX;
            startY = e.clientY - currentTranslateY;
            svg.style.cursor = 'grabbing';
        });
        window.addEventListener('mousemove', e => {
            if (!isPanning) return;
            currentTranslateX = e.clientX - startX;
            currentTranslateY = e.clientY - startY;
            svg.style.transform = `translate(${currentTranslateX}px, ${currentTranslateY}px) scale(${currentScale})`;
        });
        window.addEventListener('mouseup', () => {
            isPanning = false;
            svg.style.cursor = 'grab';
        });
        svg.style.cursor = 'grab';
    }

    function resetZoom() {
        currentScale = 1;
        currentTranslateX = 0;
        currentTranslateY = 0;
        svg.style.transform = `translate(0px, 0px) scale(1)`;
    }

    function updateUI() {
        // 更新地图图片
        mapImage.setAttribute('href', currentMap.img);
        mapImage.setAttribute('width', '1920');
        mapImage.setAttribute('height', '1080');
        updateSkillIcons();
        filterSkills();
        resetZoom();
        clearLocked();
    }

    // 坐标拾取
    if (coordPickerBtn) {
        coordPickerBtn.addEventListener('click', () => {
            coordPickerActive = !coordPickerActive;
            coordPickerBtn.classList.toggle('active', coordPickerActive);
            showMsg(coordPickerActive ? '坐标拾取模式已开启，点击地图任意位置获取坐标' : '坐标拾取模式已关闭');
        });
        svg.addEventListener('click', (e) => {
            if (!coordPickerActive) return;
            e.stopPropagation();
            const rect = svg.getBoundingClientRect();
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            const x = ((clientX - rect.left) / rect.width) * 1920;
            const y = ((clientY - rect.top) / rect.height) * 1080;
            showMsg(`技能/站位坐标:\nX = ${Math.round(x)}\nY = ${Math.round(y)}`);
        });
    }

    // 技能筛选按钮绑定
    const skillBtns = document.querySelectorAll('.skill-btn');
    skillBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const skill = btn.getAttribute('data-skill');
            if (currentSkillFilter === skill) {
                currentSkillFilter = null;
                btn.classList.remove('active');
            } else {
                currentSkillFilter = skill;
                skillBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            filterSkills();
            clearLocked();
        });
    });

    // 初始化
    updateUI();
    initSVGPanZoom();
    bindClearOnBlank();
</script>
</body>
</html>
